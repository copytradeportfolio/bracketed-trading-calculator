<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bracketed Trading Growth Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    padding: 12px 16px;
  }

  h1 { font-size: 1.1rem; color: #58a6ff; display: inline; }
  .subtitle { color: #8b949e; font-size: 0.78rem; margin-left: 8px; }

  /* Controls — single row */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 10px 14px;
    margin: 10px 0 8px;
    align-items: flex-end;
  }
  .ctrl { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 100px; }
  .ctrl label { font-size: 0.68rem; color: #8b949e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .ctrl input[type="number"] {
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    color: #e6edf3; font-size: 0.88rem; padding: 5px 8px; width: 100%; outline: none;
  }
  .ctrl input[type="number"]:focus { border-color: #58a6ff; }
  .ctrl input[type="range"] { accent-color: #58a6ff; width: 100%; cursor: pointer; margin-top: 2px; }
  .range-val { color: #58a6ff; font-weight: 700; }

  /* Metrics — 4 in one row */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }
  .metric {
    background: linear-gradient(135deg, #1c2333, #21262d);
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 8px 12px;
  }
  .metric-label { color: #a8c0d6; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
  .metric-value { color: #fff; font-size: 1.2rem; font-weight: 700; line-height: 1.1; }
  .metric-delta { color: #3fb950; font-size: 0.75rem; margin-top: 2px; }

  /* Chart */
  .chart-box {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 10px 12px 8px;
    margin-bottom: 8px;
  }
  .chart-title { color: #58a6ff; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; }

  /* Table toggle */
  .toggle-btn {
    background: none; border: 1px solid #30363d; color: #8b949e;
    border-radius: 6px; padding: 4px 12px; font-size: 0.75rem;
    cursor: pointer; margin-bottom: 6px;
  }
  .toggle-btn:hover { border-color: #58a6ff; color: #58a6ff; }

  .table-box {
    background: #161b22; border: 1px solid #30363d;
    border-radius: 10px; overflow: auto; max-height: 200px;
    display: none;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  thead tr { background: #21262d; position: sticky; top: 0; }
  thead th { padding: 6px 10px; text-align: left; color: #8b949e; font-size: 0.68rem; text-transform: uppercase; }
  tbody tr { border-bottom: 1px solid #21262d; }
  tbody tr:hover { background: #1c2333; }
  tbody td { padding: 5px 10px; }
  .badge { display: inline-block; padding: 1px 7px; border-radius: 8px; font-weight: 700; font-size: 0.72rem; background: #1f3d5c; color: #58a6ff; }

  .footer { color: #4a5568; font-size: 0.68rem; text-align: center; margin-top: 6px; }
</style>
</head>
<body>

<h1>📈 Bracketed Trading Growth Calculator</h1>
<span class="subtitle">Compound growth with bracket-based lot scaling</span>

<!-- Controls -->
<div class="controls">
  <div class="ctrl">
    <label>Starting Balance ($)</label>
    <input type="number" id="startBalance" value="100" min="10" step="10">
  </div>
  <div class="ctrl">
    <label>Daily Profit (%)</label>
    <input type="number" id="dailyPct" value="3" min="0.1" max="50" step="0.1">
  </div>
  <div class="ctrl">
    <label>Bracket Size ($)</label>
    <input type="number" id="bracketSize" value="100" min="10" step="10">
  </div>
  <div class="ctrl" style="min-width:130px;">
    <label>Days: <span class="range-val" id="daysVal">60</span></label>
    <input type="range" id="numDays" value="60" min="30" max="730" step="10">
  </div>
</div>

<!-- Metrics -->
<div class="metrics">
  <div class="metric">
    <div class="metric-label">Starting Balance</div>
    <div class="metric-value" id="m-start">$100.00</div>
  </div>
  <div class="metric">
    <div class="metric-label">Final Balance</div>
    <div class="metric-value" id="m-final">—</div>
    <div class="metric-delta" id="m-gain">—</div>
  </div>
  <div class="metric">
    <div class="metric-label">Total Growth</div>
    <div class="metric-value" id="m-pct">—</div>
  </div>
  <div class="metric">
    <div class="metric-label">Max Bracket</div>
    <div class="metric-value" id="m-bracket">—</div>
  </div>
</div>

<!-- Chart -->
<div class="chart-box">
  <div class="chart-title">Account Growth Over Time</div>
  <canvas id="growthChart" height="140"></canvas>
</div>

<!-- Table toggle -->
<button class="toggle-btn" onclick="toggleTable()">▼ Show day-by-day breakdown</button>
<div class="table-box" id="tableBox">
  <table>
    <thead><tr><th>Day</th><th>Balance ($)</th><th>Daily Profit ($)</th><th>Bracket</th></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<p class="footer" id="footer-txt"></p>

<script>
  let chart = null;
  let tableVisible = false;

  function toggleTable() {
    tableVisible = !tableVisible;
    document.getElementById('tableBox').style.display = tableVisible ? 'block' : 'none';
    document.querySelector('.toggle-btn').textContent = tableVisible ? '▲ Hide breakdown' : '▼ Show day-by-day breakdown';
  }

  function fmt(n) { return n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }

  function calculate() {
    const start   = parseFloat(document.getElementById('startBalance').value) || 100;
    const pct     = parseFloat(document.getElementById('dailyPct').value)     || 3;
    const bracket = parseFloat(document.getElementById('bracketSize').value)  || 100;
    const days    = parseInt(document.getElementById('numDays').value)        || 60;
    document.getElementById('daysVal').textContent = days;

    const rows = [];
    let balance = start;
    for (let d = 1; d <= days; d++) {
      const profit = balance * (pct / 100);
      balance += profit;
      const b = Math.floor((balance - start) / bracket) + 1;
      rows.push({ day: d, balance: +balance.toFixed(2), profit: +profit.toFixed(2), bracket: b });
    }

    const final   = rows[rows.length-1].balance;
    const gain    = final - start;
    const gainPct = (gain / start) * 100;
    const maxB    = rows[rows.length-1].bracket;

    document.getElementById('m-start').textContent   = '$' + fmt(start);
    document.getElementById('m-final').textContent   = '$' + fmt(final);
    document.getElementById('m-gain').textContent    = '▲ +$' + fmt(gain);
    document.getElementById('m-pct').textContent     = gainPct.toFixed(1) + '%';
    document.getElementById('m-bracket').textContent = '#' + maxB;

    const labels   = rows.map(r => r.day);
    const balances = rows.map(r => r.balance);

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('growthChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Balance ($)',
            data: balances,
            borderColor: '#58a6ff',
            backgroundColor: 'rgba(88,166,255,0.07)',
            fill: true, borderWidth: 2, pointRadius: 0, tension: 0.3,
          },
          {
            label: 'Bracket Up',
            data: labels.map((d,i) => (i===0 || rows[i].bracket !== rows[i-1].bracket) ? balances[i] : null),
            borderColor: 'transparent', backgroundColor: '#3fb950',
            pointRadius: 6, pointStyle: 'triangle', showLine: false,
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: '#8b949e', font: { size: 11 } } },
          tooltip: { callbacks: { label: ctx => ' $' + fmt(ctx.parsed.y) } }
        },
        scales: {
          x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#21262d' } },
          y: { ticks: { color: '#8b949e', font: { size: 10 }, callback: v => '$' + fmt(v) }, grid: { color: '#21262d' } }
        }
      }
    });

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    rows.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${r.day}</td><td>$${fmt(r.balance)}</td><td>$${fmt(r.profit)}</td><td><span class="badge">#${r.bracket}</span></td>`;
      tbody.appendChild(tr);
    });

    document.getElementById('footer-txt').textContent =
      `${pct}% daily profit compounding. Bracket increases every $${bracket.toLocaleString()} of cumulative profit.`;
  }

  ['startBalance','dailyPct','bracketSize','numDays'].forEach(id => {
    document.getElementById(id).addEventListener('input', calculate);
  });

  calculate();
</script>
</body>
</html>
